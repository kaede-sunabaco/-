<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録｜たまごの巣立ち</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header"><div class="container header-inner"><a class="brand" href="../tamago-top-page/index.html"><span class="brand-eggs"><span class="brand-egg"></span><span class="brand-egg"></span><span class="brand-egg yellow"></span></span><span class="brand-name">たまごの巣立ち</span></a><nav class="global-nav"><a href="creators.html">制作者検索</a><a href="request.html">相談・依頼</a><a href="mypage.html">マイページ</a><a href="login.html">ログイン</a></nav><button class="menu-button" type="button" aria-label="メニューを開く"></button></div></header>
  <main>
    <section class="page-heading"><div class="container"><h1>新規登録</h1><p>あなたに合った使い方ではじめましょう。</p></div></section>
    <section class="section"><div class="container"><form class="card form-card">
      <!-- role は依頼者 client／制作者 creator を想定しています -->
      <div class="form-group"><span class="form-label">利用目的<span class="required">必須</span></span><label class="checkbox"><input type="radio" name="role" value="client" checked>依頼者として相談・依頼したい</label><label class="checkbox"><input type="radio" name="role" value="creator">制作者として実績を作りたい</label></div>
      <div class="form-group"><label for="name">ユーザー名<span class="required">必須</span></label><input class="input" id="name" name="name" type="text" placeholder="たまご 太郎"></div>
      <div class="form-group"><label for="reg-email">メールアドレス<span class="required">必須</span></label><input class="input" id="reg-email" name="email" type="email" placeholder="example@email.com"></div>
      <div class="form-group"><label for="reg-password">パスワード<span class="required">必須</span></label><input class="input" id="reg-password" name="password" type="password" placeholder="8文字以上で入力してください"></div>
      <label class="checkbox"><input type="checkbox">利用規約・プライバシーポリシーに同意する</label>
      <button class="btn btn-primary btn-block" type="button" style="margin-top:22px">無料で登録する</button>
      <p class="auth-links">登録済みの方は <a href="login.html">ログイン</a></p>
    </form></div></section>
  </main>
  <footer class="site-footer"><div class="container footer-inner"><a class="brand" href="../tamago-top-page/index.html" style="color:#fff"><span class="brand-eggs"><span class="brand-egg"></span><span class="brand-egg"></span><span class="brand-egg yellow"></span></span><span class="brand-name">たまごの巣立ち</span></a><div class="footer-links"><a href="#">利用規約</a><a href="#">プライバシー</a><a href="#">お問い合わせ</a></div><p class="copyright">&copy; 2026 たまごの巣立ち All rights reserved.</p></div></footer>
</body>
</html>
